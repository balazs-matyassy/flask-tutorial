{% extends 'base.html' %}

{% block main %}
    <h1>{{ title }}</h1>

    <table class="table">
        <thead>
        <tr>
            <th>Category</th>
            <th>Name</th>
            <th>Description</th>
            <th>Difficulty</th>
        </tr>
        </thead>
        <tbody>
        {% for recipe in recipes %}
            <tr>
                <td>{{ recipe.category }}</td>
                <td>{{ recipe.name }}</td>
                <td>{{ recipe.description }}</td>
                <td>
                    {{ '★' * recipe.difficulty }}{{ '☆' * (5 - recipe.difficulty) }}
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
{% endblock %}
